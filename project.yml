name: InkFlow
options:
  bundleIdPrefix: com.inkflow
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  InkFlowKit:
    path: .

targets:
  InkFlow:
    type: application
    platform: [iOS, macOS]
    sources:
      - path: App/InkFlow
        excludes:
          - "**/*.xcassets"
    resources:
      - path: App/InkFlow/Resources/Assets.xcassets
    dependencies:
      - package: InkFlowKit
        product: InkFlowKit
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown"
        SWIFT_EMIT_LOC_STRINGS: YES
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.inkflow.app
        PRODUCT_NAME: InkFlow
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic

  InkFlowUITests_iOS:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: App/InkFlowUITests
    dependencies:
      - target: InkFlow_iOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.inkflow.app.uitests
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic

  InkFlowUITests_macOS:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: App/InkFlowUITests
    dependencies:
      - target: InkFlow_macOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.inkflow.app.uitests
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
