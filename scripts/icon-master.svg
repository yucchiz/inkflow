<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background: washi paper tone (#F3F4F6) with rounded corners -->
  <rect width="512" height="512" rx="24" fill="#F3F4F6"/>

  <!-- === 「筆」character in calligraphic serif === -->
  <text x="256" y="276"
        font-family="'Hiragino Mincho ProN', 'YuMincho', 'Noto Serif CJK JP', serif"
        font-size="320"
        font-weight="600"
        fill="#1F2937"
        text-anchor="middle"
        dominant-baseline="central">筆</text>

  <!-- === Indigo ink drop accent (紺青墨滴) === -->
  <!-- Brush tip drip: below the vertical stroke -->
  <ellipse cx="256" cy="445" rx="7" ry="5.5"
           transform="rotate(-15, 256, 445)" fill="#1E40AF"/>
</svg>
