<?xml version="1.0" encoding="UTF-8"?>
<!-- InkFlow — Modern Enso Icon (Master Source)
     Geometric open circle (zen enso) + trailing ink drop
     White on Indigo (#5856D6)
     Design: Digital Atelier design system -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background: InkFlow Indigo -->
  <rect width="512" height="512" fill="#5856D6"/>

  <!-- Enso: open circle arc with rounded ends
       - radius 126, stroke 40 → visible at all sizes
       - dasharray 680 112 → ~86% arc, ~14% gap
       - rotate -30 → gap at top-right -->
  <circle cx="256" cy="260" r="126"
          fill="none"
          stroke="#FFFFFF"
          stroke-width="40"
          stroke-linecap="round"
          stroke-dasharray="680 112"
          transform="rotate(-30, 256, 260)"/>

  <!-- Trailing ink drop: the next stroke about to begin -->
  <circle cx="344" cy="168" r="12"
          fill="#FFFFFF" opacity="0.6"/>
</svg>
